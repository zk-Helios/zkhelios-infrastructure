apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels: { app: {{ .Release.Name }}, component: api }
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: {{ .Release.Name }}, component: api }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}, component: api }
      annotations: { prometheus.io/scrape: "true", prometheus.io/path: "/metrics", prometheus.io/port: "4000" }
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.service.targetPort }} }]
          envFrom:
            - secretRef: { name: {{ .Values.existingSecret }} }
          env:
            - { name: NODE_ENV, value: {{ .Values.env.NODE_ENV | quote }} }
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health/live, port: {{ .Values.service.targetPort }} }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health/ready, port: {{ .Values.service.targetPort }} }
            initialDelaySeconds: 5
          startupProbe:
            httpGet: { path: /health/live, port: {{ .Values.service.targetPort }} }
            failureThreshold: 30
            periodSeconds: 2
