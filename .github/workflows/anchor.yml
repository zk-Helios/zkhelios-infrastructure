name: Anchor

on:
  push:
    branches: [main]
    paths: ["zkhelios/**"]
  pull_request:
    paths: ["zkhelios/**"]

jobs:
  program:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zkhelios
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor (avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install latest && avm use latest

      - name: Format + lint
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      - name: Build
        run: anchor build

      - name: Test (litesvm)
        run: cargo test --manifest-path programs/zkhelios/Cargo.toml

      - name: Program size budget (< 200KB)
        run: |
          size=$(stat -c%s target/deploy/zkhelios.so)
          echo "program size: $size bytes"
          test "$size" -lt 204800
