name: API

on:
  push:
    branches: [main]
    paths: ["apps/api/**", "packages/db/**", "packages/shared-types/**"]
  pull_request:
    paths: ["apps/api/**", "packages/db/**", "packages/shared-types/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: zk, POSTGRES_PASSWORD: zk, POSTGRES_DB: zkhelios }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U zk" --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://zk:zk@localhost:5432/zkhelios?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_JWT_SECRET: ci_secret_change_me_min_32_chars_long_xx
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @zkhelios/db db:generate
      - run: pnpm --filter @zkhelios/db db:deploy
      - run: pnpm --filter @zkhelios/api lint || true
      - run: pnpm --filter @zkhelios/api type-check
      - run: pnpm --filter @zkhelios/api test
      - run: pnpm --filter @zkhelios/api build
      - name: Security audit (high/critical)
        run: pnpm audit --audit-level high || true
