name: Deploy

# Manual-only until a deploy target + secrets (ghcr, kube context) are configured.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }},ghcr.io/${{ github.repository }}/api:latest

  deploy-staging:
    needs: build-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "helm upgrade --install zkhelios-api infra/helm/zkhelios-api --set image.tag=${{ github.sha }} -n staging"

  smoke:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - run: echo "curl -f https://staging-api.zkhelios.app/health/ready"

  deploy-production:
    needs: smoke
    runs-on: ubuntu-latest
    environment: production # requires manual approval gate
    steps:
      - run: echo "canary → full: helm upgrade --install zkhelios-api infra/helm/zkhelios-api --set image.tag=${{ github.sha }} -n production"
