name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @zkhelios/db db:generate

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm build
